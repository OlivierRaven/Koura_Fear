project:
  type: manuscript
  output-dir: docs
  post-render: deploy.R

execute:
  freeze: false
  cache: true
  warning: false
  message: false

number-sections: false

manuscript:
  article: index.qmd
  notebooks:
    - notebook: analysis.qmd
      title: "Analysis Notebook"

format:
  html:
    theme:
      light: flatly
      dark: darkly
    code-fold: true
    code-tools: true
    code-summary: "View Code"
    toc: true
    toc-depth: 3
    toc-location: left
    smooth-scroll: true
    format-links: [pdf, docx]
  pdf:
    toc: true
    colorlinks: true
    link-citations: true
    include-in-header: references/header.tex
  docx:
    reference-doc: references/reference.docx
    filters:
      - at: pre-quarto
        path: filters/docx-title-page.lua

fig-width: 8
fig-height: 6

bibliography: references/references.bib
csl: references/biological-invasions.csl
